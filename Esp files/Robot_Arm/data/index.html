<!DOCTYPE html>
<html>
<body>

<h2>ESP32 Arm</h2>

<script>
let ws = new WebSocket("ws://" + location.host + "/ws");

ws.onmessage = e => console.log(e.data);

function send(name, val){
  ws.send(name + "," + val);
}
</script>

<button onclick="send('Base',120)">Base 120</button>
<button onclick="send('Elbow',60)">Elbow 60</button>

</body>
</html>
